<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligent Transportation System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 400px; height: 280px; overflow: hidden; font-family: 'Barlow', sans-serif; background: #0d1117; }
  .card { width: 100%; height: 100%; background: #0d1117; position: relative; overflow: hidden; }

  /* Road grid map bg */
  .road-bg {
    position: absolute; inset: 0;
    background-color: #0d1117;
    background-image:
      linear-gradient(rgba(255,200,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,200,0,0.04) 1px, transparent 1px),
      linear-gradient(rgba(255,200,0,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,200,0,0.02) 1px, transparent 1px);
    background-size: 60px 60px, 60px 60px, 15px 15px, 15px 15px;
  }

  /* Amber glow */
  .glow { position: absolute; width: 280px; height: 280px; border-radius: 50%; background: radial-gradient(circle, rgba(255,180,0,0.12) 0%, transparent 65%); top: -60px; left: -40px; }
  .glow2 { position: absolute; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(255,100,0,0.08) 0%, transparent 65%); bottom: -60px; right: -20px; }

  .content { position: relative; z-index: 2; padding: 22px 26px; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }

  .top-row { display: flex; align-items: flex-start; justify-content: space-between; }

  .title { font-family: 'Bebas Neue', sans-serif; font-size: 38px; color: #ffffff; line-height: 0.95; letter-spacing: 0.02em; }
  .title .accent { color: #ffb800; }

  /* Mini map / road visual */
  .map-visual { position: relative; width: 110px; height: 85px; }

  /* Road */
  .road-h { position: absolute; left: 0; right: 0; top: 38px; height: 14px; background: rgba(255,255,255,0.06); border-top: 1px solid rgba(255,184,0,0.2); border-bottom: 1px solid rgba(255,184,0,0.2); }
  .road-v { position: absolute; left: 52px; top: 0; bottom: 0; width: 14px; background: rgba(255,255,255,0.06); border-left: 1px solid rgba(255,184,0,0.2); border-right: 1px solid rgba(255,184,0,0.2); }

  /* Dashes */
  .dash { position: absolute; height: 2px; background: rgba(255,184,0,0.35); border-radius: 1px; top: 44px; }
  .dash-v { position: absolute; width: 2px; background: rgba(255,184,0,0.35); border-radius: 1px; left: 58px; }

  /* Cars */
  .car { position: absolute; width: 10px; height: 6px; border-radius: 2px; }
  .car.moving { animation: drive 2s linear infinite; }
  .car1 { background: #ffb800; top: 37px; left: 5px; animation: drive-r 3s linear infinite; box-shadow: 0 0 6px rgba(255,184,0,0.8); }
  .car2 { background: #ff6b35; top: 44px; left: 70px; width: 8px; height: 5px; animation: drive-r2 4s linear infinite 1s; }
  .car3 { background: #ffb800; left: 55px; top: 5px; width: 6px; height: 10px; border-radius: 2px; animation: drive-d 3.5s linear infinite 0.5s; box-shadow: 0 0 4px rgba(255,184,0,0.6); }

  @keyframes drive-r { 0%{left:5px;opacity:1} 100%{left:115px;opacity:0.3} }
  @keyframes drive-r2 { 0%{left:70px;opacity:0.7} 100%{left:5px;opacity:1} }
  @keyframes drive-d { 0%{top:5px;opacity:1} 100%{top:90px;opacity:0.3} }

  /* Traffic light */
  .traffic-light { position: absolute; right: 0; top: 5px; width: 12px; background: #1a1a2e; border: 1px solid rgba(255,184,0,0.2); border-radius: 3px; padding: 3px 2px; display: flex; flex-direction: column; gap: 2px; align-items: center; }
  .tl-dot { width: 6px; height: 6px; border-radius: 50%; }
  .tl-red { background: #e74c3c; box-shadow: 0 0 4px #e74c3c; }
  .tl-yellow { background: #333; }
  .tl-green { background: #333; animation: tlblink 2s steps(1) infinite; }
  @keyframes tlblink { 0%,49%{background:#2ecc71; box-shadow:0 0 4px #2ecc71;} 50%,100%{background:#333; box-shadow:none;} }

  .stats-row { display: flex; gap: 10px; }
  .stat-box { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,184,0,0.15); border-radius: 6px; padding: 8px 10px; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #ffb800; line-height: 1; }
  .stat-label { font-size: 9px; color: rgba(255,255,255,0.35); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }

  .bottom-row { display: flex; align-items: center; justify-content: space-between; }
  .tech-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .tech-pill { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; color: rgba(255,184,0,0.5); background: rgba(255,184,0,0.05); border: 1px solid rgba(255,184,0,0.15); padding: 3px 8px; border-radius: 3px; letter-spacing: 0.04em; }
  .live-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; color: #2ecc71; background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); padding: 4px 10px; border-radius: 3px; letter-spacing: 0.06em; display: flex; align-items: center; gap: 5px; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #2ecc71; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }
</style>
</head>
<body>
<div class="card">
  <div class="road-bg"></div>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="top-row">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:rgba(255,184,0,0.5);letter-spacing:0.1em;margin-bottom:4px;">INTELLIGENT TRANSPORTATION</div>
        <div class="title">TRAFFIC<br><span class="accent">PREDICT</span></div>
      </div>
      <div class="map-visual">
        <div class="road-h"></div>
        <div class="road-v"></div>
        <div class="dash" style="left:8px;width:18px;"></div>
        <div class="dash" style="left:34px;width:12px;"></div>
        <div class="dash" style="left:72px;width:18px;"></div>
        <div class="dash" style="left:96px;width:12px;"></div>
        <div class="dash-v" style="top:8px;height:22px;"></div>
        <div class="dash-v" style="top:55px;height:22px;"></div>
        <div class="car car1"></div>
        <div class="car car2"></div>
        <div class="car car3"></div>
        <div class="traffic-light">
          <div class="tl-dot tl-red"></div>
          <div class="tl-dot tl-yellow"></div>
          <div class="tl-dot tl-green"></div>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val">94.7%</div>
        <div class="stat-label">Travel Accuracy</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">0.91</div>
        <div class="stat-label">F1 Score</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">RT</div>
        <div class="stat-label">TomTom API</div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="tech-row">
        <div class="tech-pill">XGBoost</div>
        <div class="tech-pill">LSTM</div>
        <div class="tech-pill">GCN</div>
        <div class="tech-pill">Streamlit</div>
      </div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>
  </div>
</div>
</body>
</html>
