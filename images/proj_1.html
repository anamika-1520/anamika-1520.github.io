<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Insight Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 400px; height: 280px; overflow: hidden; font-family: 'DM Sans', sans-serif; background: #0a0a0f; }
  .card { width: 100%; height: 100%; background: #0a0a0f; position: relative; overflow: hidden; }
  .grid {
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,50,50,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255,50,50,0.07) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .glow { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(255,30,30,0.2) 0%, transparent 70%); top: -80px; right: -80px; animation: pulse 3s ease-in-out infinite alternate; }
  @keyframes pulse { from { transform: scale(1); opacity: 0.7; } to { transform: scale(1.2); opacity: 1; } }
  .content { position: relative; z-index: 2; padding: 26px 28px; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
  .top-row { display: flex; align-items: center; justify-content: space-between; }
  .yt-icon { width: 44px; height: 30px; background: #FF0000; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
  .yt-icon::after { content: ''; width: 0; height: 0; border-top: 7px solid transparent; border-bottom: 7px solid transparent; border-left: 13px solid white; margin-left: 2px; }
  .tag { font-family: 'Space Mono', monospace; font-size: 10px; color: #FF4444; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); padding: 4px 10px; border-radius: 20px; }
  .title { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; color: #ffffff; line-height: 1.2; }
  .title span { color: #FF4444; }
  .chat-preview { display: flex; flex-direction: column; gap: 7px; }
  .chat-bubble { display: flex; align-items: flex-start; gap: 8px; }
  .chat-bubble.user { flex-direction: row-reverse; }
  .avatar { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; }
  .avatar.bot { background: #FF4444; color: white; }
  .avatar.usr { background: #333; color: #aaa; }
  .bubble-text { font-size: 11px; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); padding: 6px 10px; border-radius: 10px; line-height: 1.4; max-width: 220px; }
  .bubble-text.bot-msg { border-color: rgba(255,68,68,0.2); background: rgba(255,68,68,0.06); color: rgba(255,255,255,0.85); }
  .tech-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tech-pill { font-family: 'Space Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); padding: 3px 8px; border-radius: 4px; }
  .typing { display: flex; align-items: center; gap: 3px; padding: 6px 10px; background: rgba(255,68,68,0.06); border: 1px solid rgba(255,68,68,0.2); border-radius: 10px; }
  .dot { width: 4px; height: 4px; background: #FF4444; border-radius: 50%; animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="top-row">
      <div class="yt-icon"></div>
      <div class="tag">RAG · LangChain</div>
    </div>
    <div class="title">YouTube<br>Insight <span>Chatbot</span></div>
    <div class="chat-preview">
      <div class="chat-bubble user">
        <div class="avatar usr">U</div>
        <div class="bubble-text">What did the video say about RAG?</div>
      </div>
      <div class="chat-bubble">
        <div class="avatar bot">AI</div>
        <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      </div>
    </div>
    <div class="tech-row">
      <div class="tech-pill">LangChain</div>
      <div class="tech-pill">Embeddings</div>
      <div class="tech-pill">Vector Search</div>
      <div class="tech-pill">Streamlit</div>
    </div>
  </div>
</div>
</body>
</html>
